# VidLens 配置文件

server:
  port: 8080
  mode: debug  # debug / release

database:
  host: 127.0.0.1
  port: 3307
  username: root
  password: root
  dbname: vidlens
  charset: utf8mb4

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0

minio:
  endpoint: localhost:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: vidlens
  use_ssl: false

kafka:
  brokers:
    - localhost:19092
  analyze_topic: "video-analyze"
  transcribe_topic: "video-transcribe"
  consumer_group: "vidlens-worker"

ai:
  provider: "mimo"  # mimo / siliconflow
  # MiMo Token Plan：PowerShell 中设置 $env:MIMO_API_KEY="tp-..."
  mimo_api_key: "${MIMO_API_KEY}"
  # 如果控制台给你的 Token Plan endpoint 不同，改这里即可。
  mimo_base_url: "https://token-plan-cn.xiaomimimo.com/v1"

  siliconflow_api_key: "${SILICONFLOW_API_KEY}"
  siliconflow_base_url: "https://api.siliconflow.com/v1"
  asr_model: "mimo-v2.5-asr"
  llm_model: "mimo-v2.5"

tools:
  ffmpeg_path: "D:/tools/ffmpeg/bin/ffmpeg.exe"
  ytdlp_path: "D:/tools/yt-dlp/yt-dlp.exe"

jwt:
  secret: "vidlens-jwt-secret-change-in-production"
  expire_hours: 72

upload:
  max_file_size: 2147483648  # 2GB
  chunk_size: 5242880        # 5MB

ratelimit:
  capacity: 10    # 桶容量
  rate: 10        # 每秒生成令牌数
