<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidLens RRF 融合检索演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Space Grotesk', system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: linear-gradient(135deg, #1e293b, #334155); padding: 20px 32px; border-bottom: 1px solid #374151; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }

  .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }

  .step-display { width: 100%; max-width: 800px; margin-bottom: 24px; }
  .step-card { background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; opacity: 0; transform: translateY(20px); transition: all 0.4s ease; }
  .step-card.active { opacity: 1; transform: translateY(0); }
  .step-number { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #f59e0b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
  .step-title { font-size: 20px; font-weight: 700; margin: 8px 0; color: #fff; }
  .step-desc { font-size: 14px; color: #a3a3a3; line-height: 1.7; margin-bottom: 16px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

  .col-header { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #2a2a2a; }
  .col-vector { color: #a78bfa; }
  .col-keyword { color: #4ade80; }

  .rank-list { list-style: none; }
  .rank-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 13px; transition: all 0.3s ease; }
  .rank-item.highlight { background: #1a1a2e; }
  .rank-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; width: 20px; text-align: center; }
  .rank-text { flex: 1; color: #d4d4d4; }
  .rank-score { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #737373; }

  .fusion-box { background: #1a1a1a; border: 2px solid #f59e0b; border-radius: 10px; padding: 18px; margin-top: 16px; }
  .fusion-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #f59e0b; font-weight: 700; margin-bottom: 12px; }
  .fusion-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #2a2a2a; font-size: 13px; }
  .fusion-item:last-child { border-bottom: none; }
  .fusion-rank { font-family: 'JetBrains Mono', monospace; font-weight: 700; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; }
  .fusion-rank.top { background: #f59e0b; color: #000; }
  .fusion-rank.mid { background: #374151; color: #d4d4d4; }
  .fusion-text { flex: 1; color: #d4d4d4; }
  .fusion-score { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #f59e0b; font-weight: 600; }
  .fusion-badges { display: flex; gap: 4px; }
  .fusion-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600; }
  .badge-v { background: #1e1b4b; color: #a78bfa; }
  .badge-k { background: #052e16; color: #4ade80; }
  .badge-both { background: #451a03; color: #fbbf24; }

  .formula { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #a3e635; text-align: center; }

  .controls { display: flex; gap: 10px; margin-top: 8px; }
  .btn { padding: 10px 20px; border: 1px solid #374151; border-radius: 8px; background: #1a1a1a; color: #e5e5e5; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; font-family: inherit; }
  .btn:hover { background: #262626; border-color: #525252; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .btn-primary:hover { background: #d97706; }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 VidLens — 向量 + BM25 + RRF 融合检索</h1>
  <p>演示 RRF (Reciprocal Rank Fusion) 如何融合两种检索结果，取长补短</p>
</div>

<div class="main">
  <div class="step-display">
    <div class="step-card" id="step-card"></div>
  </div>

  <div class="controls">
    <button class="btn" onclick="prev()">← 上一步</button>
    <button class="btn btn-primary" onclick="next()">下一步 →</button>
    <button class="btn" onclick="reset()">R 重置</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">A 自动播放</button>
  </div>
</div>

<script>
// 模拟数据：视频转录分块
const chunks = [
  { id: 'C1', text: '机器学习的基本概念包括监督学习、无监督学习和强化学习...' },
  { id: 'C2', text: '深度学习使用多层神经网络来处理复杂的模式识别任务...' },
  { id: 'C3', text: 'Python 是数据科学和机器学习领域最流行的编程语言...' },
  { id: 'C4', text: 'TensorFlow 和 PyTorch 是两个主流的深度学习框架...' },
  { id: 'C5', text: '数据预处理是机器学习项目中最重要的步骤之一...' },
  { id: 'C6', text: '卷积神经网络 CNN 在图像识别任务中表现出色...' },
  { id: 'C7', text: '自然语言处理 NLP 技术可以用于文本分类和情感分析...' },
  { id: 'C8', text: '模型评估指标包括准确率、召回率、F1 分数等...' },
];

// 用户问题
const question = '什么是深度学习？';

// 向量检索结果（语义相似）
const vectorResults = [
  { id: 'C2', rank: 1, score: 0.92 },
  { id: 'C4', rank: 2, score: 0.87 },
  { id: 'C1', rank: 3, score: 0.81 },
  { id: 'C6', rank: 4, score: 0.76 },
  { id: 'C7', rank: 5, score: 0.71 },
];

// BM25 关键词检索结果（精确匹配）
const keywordResults = [
  { id: 'C1', rank: 1, score: 8.5 },
  { id: 'C3', rank: 2, score: 6.2 },
  { id: 'C2', rank: 3, score: 5.8 },
  { id: 'C5', rank: 4, score: 4.1 },
  { id: 'C8', rank: 5, score: 3.2 },
];

// RRF 融合
const K = 60;
function rrfScore(vectorRank, keywordRank) {
  let score = 0;
  if (vectorRank > 0) score += 1 / (K + vectorRank);
  if (keywordRank > 0) score += 1 / (K + keywordRank);
  return score;
}

const allChunkIds = [...new Set([...vectorResults.map(v => v.id), ...keywordResults.map(k => k.id)])];
const fusionResults = allChunkIds.map(id => {
  const v = vectorResults.find(r => r.id === id);
  const k = keywordResults.find(r => r.id === id);
  return {
    id,
    text: chunks.find(c => c.id === id).text,
    vectorRank: v ? v.rank : 0,
    keywordRank: k ? k.rank : 0,
    rrfScore: rrfScore(v ? v.rank : 0, k ? k.rank : 0),
    inVector: !!v,
    inKeyword: !!k,
  };
}).sort((a, b) => b.rrfScore - a.rrfScore);

const steps = [
  {
    num: 'STEP 1',
    title: '用户提问',
    desc: `用户在聊天界面提问："${question}"。系统需要从视频转录文本中找到最相关的片段作为上下文。`,
    render: () => `
      <div style="background:#1e293b;border:1px solid #3b82f6;border-radius:10px;padding:18px;text-align:center;">
        <div style="font-size:13px;color:#94a3b8;margin-bottom:8px;">用户问题</div>
        <div style="font-size:18px;font-weight:700;color:#fff;">"${question}"</div>
        <div style="font-size:12px;color:#64748b;margin-top:8px;">视频共有 ${chunks.length} 个转录分块待检索</div>
      </div>
    `,
  },
  {
    num: 'STEP 2',
    title: '向量检索（语义相似）',
    desc: '问题经过 Embedding 模型转为向量，在 Milvus 中做余弦相似度搜索。返回 Top-5 语义最相关的分块。',
    render: () => `
      <div class="two-col">
        <div>
          <div class="col-header col-vector">🔍 向量检索结果 (Milvus)</div>
          <ul class="rank-list">
            ${vectorResults.map(r => `
              <li class="rank-item">
                <span class="rank-num" style="color:#a78bfa">${r.rank}</span>
                <span class="rank-text">${chunks.find(c => c.id === r.id).text.slice(0, 40)}...</span>
                <span class="rank-score">${r.score.toFixed(2)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
        <div>
          <div style="font-size:12px;color:#737373;margin-bottom:12px;">向量检索擅长：</div>
          <div style="font-size:13px;color:#a3a3a3;line-height:1.8;">
            ✅ 语义相似匹配<br>
            ✅ "深度学习" 能匹配到 "神经网络"<br>
            ✅ 同义词、近义词都能召回<br>
            ❌ 精确关键词匹配较弱
          </div>
        </div>
      </div>
    `,
  },
  {
    num: 'STEP 3',
    title: 'BM25 关键词检索（精确匹配）',
    desc: '同时用纯 Go 实现的 BM25 对分块做全文检索。返回 Top-5 关键词最匹配的分块。',
    render: () => `
      <div class="two-col">
        <div>
          <div class="col-header col-keyword">🔤 BM25 检索结果 (PostgreSQL)</div>
          <ul class="rank-list">
            ${keywordResults.map(r => `
              <li class="rank-item">
                <span class="rank-num" style="color:#4ade80">${r.rank}</span>
                <span class="rank-text">${chunks.find(c => c.id === r.id).text.slice(0, 40)}...</span>
                <span class="rank-score">${r.score.toFixed(1)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
        <div>
          <div style="font-size:12px;color:#737373;margin-bottom:12px;">BM25 擅长：</div>
          <div style="font-size:13px;color:#a3a3a3;line-height:1.8;">
            ✅ 精确关键词匹配<br>
            ✅ "深度学习" 直接命中含该词的分块<br>
            ✅ 专有名词、技术术语匹配准确<br>
            ❌ 同义词无法召回
          </div>
        </div>
      </div>
    `,
  },
  {
    num: 'STEP 4',
    title: 'RRF 融合算法',
    desc: 'RRF 将两种检索的排名融合为统一分数。公式：score = Σ 1/(k + rank)，k=60 平滑权重。',
    render: () => `
      <div class="formula">
        RRF_score(chunk) = 1/(60 + vector_rank) + 1/(60 + keyword_rank)
      </div>
      <div style="margin-top:16px;font-size:13px;color:#a3a3a3;line-height:1.8;">
        <strong style="color:#f59e0b">关键洞察：</strong><br>
        • k=60 使得排名第 1 和排名第 10 的差异仅 12.7%（平滑作用）<br>
        • 同时出现在两种检索前列的文档，RRF 分数最高<br>
        • 只在一种检索中排名靠前的文档，RRF 分数中等
      </div>
    `,
  },
  {
    num: 'STEP 5',
    title: '融合结果排序',
    desc: '按 RRF 分数降序排列，取 Top-5 作为 LLM 的上下文。',
    render: () => `
      <div class="fusion-box">
        <div class="fusion-title">🏆 RRF 融合排名 (Top 5)</div>
        ${fusionResults.slice(0, 5).map((r, i) => `
          <div class="fusion-item">
            <div class="fusion-rank ${i < 3 ? 'top' : 'mid'}">${i + 1}</div>
            <div class="fusion-text">${r.text.slice(0, 50)}...</div>
            <div class="fusion-badges">
              ${r.inVector ? '<span class="fusion-badge badge-v">V#' + r.vectorRank + '</span>' : ''}
              ${r.inKeyword ? '<span class="fusion-badge badge-k">K#' + r.keywordRank + '</span>' : ''}
              ${r.inVector && r.inKeyword ? '<span class="fusion-badge badge-both">Both</span>' : ''}
            </div>
            <div class="fusion-score">${r.rrfScore.toFixed(4)}</div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:12px;font-size:12px;color:#737373;">
        💡 注意：C2（深度学习）在两种检索中都排名靠前，因此 RRF 分数最高。
        C3（Python）只在 BM25 中出现，C6（CNN）只在向量中出现，分数较低。
      </div>
    `,
  },
  {
    num: 'STEP 6',
    title: '构建 Prompt → LLM 回答',
    desc: '将 Top-5 分块作为上下文，连同用户问题和系统提示词一起发给 LLM，生成最终回答。',
    render: () => `
      <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:18px;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#a3e635;margin-bottom:12px;">构建的 Prompt</div>
        <div style="font-size:13px;color:#d4d4d4;line-height:1.7;">
          <div style="color:#8b5cf6;margin-bottom:8px;">[System]</div>
          你是 VidLens 视频助手。根据以下视频片段回答用户问题。<br><br>
          <div style="color:#3b82f6;margin-bottom:8px;">[Context - Top 5 RRF Fusion]</div>
          ${fusionResults.slice(0, 5).map((r, i) => `
            <div style="color:#737373;margin-bottom:4px;">片段 ${i + 1}: ${r.text}</div>
          `).join('')}
          <br>
          <div style="color:#f59e0b;margin-bottom:8px;">[User]</div>
          ${question}
        </div>
      </div>
      <div style="margin-top:16px;background:#052e16;border:1px solid #16a34a;border-radius:10px;padding:18px;">
        <div style="font-size:13px;color:#4ade80;font-weight:600;margin-bottom:8px;">✅ LLM 回答（SSE 流式输出）</div>
        <div style="font-size:14px;color:#d4d4d4;line-height:1.7;">
          深度学习是机器学习的一个子领域，使用多层神经网络来处理复杂的模式识别任务。
          与传统机器学习不同，深度学习可以自动学习特征表示，无需人工设计特征...
        </div>
      </div>
    `,
  },
];

let current = 0;
let autoTimer = null;

function render() {
  const s = steps[current];
  const card = document.getElementById('step-card');
  card.className = 'step-card';
  card.innerHTML = `
    <div class="step-number">${s.num}</div>
    <div class="step-title">${s.title}</div>
    <div class="step-desc">${s.desc}</div>
    ${s.render()}
  `;
  requestAnimationFrame(() => card.classList.add('active'));
}

function next() { if (current < steps.length - 1) { current++; render(); } }
function prev() { if (current > 0) { current--; render(); } }
function reset() { current = 0; stopAuto(); render(); }

function toggleAuto() {
  if (autoTimer) { stopAuto(); }
  else {
    document.getElementById('btn-auto').textContent = '⏸ 暂停';
    autoTimer = setInterval(() => {
      if (current >= steps.length - 1) { stopAuto(); return; }
      next();
    }, 4000);
  }
}
function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
  document.getElementById('btn-auto').textContent = 'A 自动播放';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  else if (e.key === 'a' || e.key === 'A') { toggleAuto(); }
  else if (e.key === 'r' || e.key === 'R') { reset(); }
});

render();
</script>
</body>
</html>
