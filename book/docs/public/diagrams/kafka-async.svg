<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect width="900" height="50" rx="0" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">VidLens — Kafka Async Processing Pipeline</text>

  <!-- ==================== Producer ==================== -->
  <rect x="30" y="80" width="120" height="50" rx="10" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Service</text>
  <text x="90" y="118" text-anchor="middle" fill="#fff" font-size="10">(Producer)</text>

  <!-- Arrow to Topic 1 -->
  <line x1="150" y1="105" x2="195" y2="105" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="172" y="98" text-anchor="middle" fill="#ef4444" font-size="9">publish</text>

  <!-- ==================== Stage 1: Video Download ==================== -->
  <!-- Topic 1 -->
  <rect x="200" y="75" width="160" height="60" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="280" y="95" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Topic 1</text>
  <text x="280" y="110" text-anchor="middle" fill="#fff" font-size="10">video-download</text>
  <text x="280" y="125" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">partition: 3, repl: 2</text>

  <!-- Consumer 1 -->
  <line x1="360" y1="105" x2="400" y2="105" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="405" y="75" width="150" height="60" rx="8" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="95" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Consumer: Download</text>
  <text x="480" y="112" text-anchor="middle" fill="#fff" font-size="10">yt-dlp / HTTP fetch</text>
  <text x="480" y="125" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">→ Upload to MinIO</text>

  <!-- Status update 1 -->
  <line x1="480" y1="135" x2="480" y2="160" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="420" y="164" width="120" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="183" text-anchor="middle" fill="#374151" font-size="10">Update: Downloaded</text>

  <!-- Arrow to next topic -->
  <line x1="555" y1="105" x2="600" y2="105" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="577" y="98" text-anchor="middle" fill="#ef4444" font-size="9">publish</text>

  <!-- ==================== Stage 2: Transcription ==================== -->
  <!-- Topic 2 -->
  <rect x="605" y="75" width="160" height="60" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="685" y="95" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Topic 2</text>
  <text x="685" y="110" text-anchor="middle" fill="#fff" font-size="10">video-transcribe</text>
  <text x="685" y="125" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">partition: 2, repl: 2</text>

  <!-- Consumer 2 (below, going left) -->
  <line x1="685" y1="135" x2="685" y2="185" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="610" y="189" width="150" height="60" rx="8" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="685" y="209" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Consumer: ASR</text>
  <text x="685" y="226" text-anchor="middle" fill="#fff" font-size="10">Whisper / ASR Engine</text>
  <text x="685" y="239" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">→ Save transcript to DB</text>

  <!-- Status update 2 -->
  <line x1="760" y1="219" x2="800" y2="219" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="804" y="205" width="80" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="844" y="224" text-anchor="middle" fill="#374151" font-size="9">Transcribed</text>

  <!-- Arrow to next topic -->
  <line x1="685" y1="249" x2="685" y2="285" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="710" y="270" fill="#ef4444" font-size="9">publish</text>

  <!-- ==================== Stage 3: Analyze ==================== -->
  <!-- Topic 3 -->
  <rect x="605" y="289" width="160" height="60" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="685" y="309" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Topic 3</text>
  <text x="685" y="324" text-anchor="middle" fill="#fff" font-size="10">video-analyze</text>
  <text x="685" y="339" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">partition: 2, repl: 2</text>

  <!-- Consumer 3 -->
  <line x1="605" y1="319" x2="555" y2="319" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="405" y="289" width="150" height="60" rx="8" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="309" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Consumer: LLM</text>
  <text x="480" y="326" text-anchor="middle" fill="#fff" font-size="10">Summary / KeyFrames</text>
  <text x="480" y="339" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">→ Save analysis to DB</text>

  <!-- Status update 3 -->
  <line x1="480" y1="349" x2="480" y2="374" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="420" y="378" width="120" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="480" y="397" text-anchor="middle" fill="#374151" font-size="10">Update: Analyzed</text>

  <!-- Arrow to next topic -->
  <line x1="405" y1="319" x2="355" y2="319" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="370" y="312" fill="#ef4444" font-size="9">publish</text>

  <!-- ==================== Stage 4: RAG Index ==================== -->
  <!-- Topic 4 -->
  <rect x="195" y="289" width="160" height="60" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="275" y="309" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Topic 4</text>
  <text x="275" y="324" text-anchor="middle" fill="#fff" font-size="10">video-rag-index</text>
  <text x="275" y="339" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">partition: 2, repl: 2</text>

  <!-- Consumer 4 -->
  <line x1="275" y1="289" x2="275" y2="253" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="200" y="189" width="150" height="60" rx="8" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="275" y="209" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Consumer: Embed</text>
  <text x="275" y="226" text-anchor="middle" fill="#fff" font-size="10">Text Chunking</text>
  <text x="275" y="239" text-anchor="middle" fill="#fff" font-size="9" opacity="0.85">→ Store to Milvus + PG</text>

  <!-- Status update 4 -->
  <line x1="200" y1="219" x2="155" y2="219" stroke="#374151" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <rect x="70" y="205" width="82" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="111" y="224" text-anchor="middle" fill="#374151" font-size="9">RAG Indexed</text>

  <!-- Final status: Completed -->
  <rect x="380" y="430" width="160" height="44" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="460" y="448" text-anchor="middle" fill="#16a34a" font-size="13" font-weight="700">Task Completed</text>
  <text x="460" y="465" text-anchor="middle" fill="#16a34a" font-size="10">All stages done</text>

  <!-- Dashed lines from status updates to completed -->
  <line x1="480" y1="406" x2="480" y2="430" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- ==================== Legend ==================== -->
  <rect x="0" y="500" width="900" height="120" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="522" text-anchor="middle" fill="#374151" font-size="13" font-weight="700">Legend</text>

  <rect x="80" y="538" width="160" height="36" rx="8" fill="url(#redGrad)" stroke="#dc2626" stroke-width="1"/>
  <text x="160" y="561" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Kafka Topic (Async)</text>

  <rect x="280" y="538" width="160" height="36" rx="8" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1"/>
  <text x="360" y="561" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Consumer Worker</text>

  <rect x="480" y="538" width="120" height="36" rx="8" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1"/>
  <text x="540" y="561" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Service (Producer)</text>

  <rect x="640" y="538" width="120" height="36" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="700" y="561" text-anchor="middle" fill="#374151" font-size="10" font-weight="600">Status Update</text>

  <rect x="80" y="585" width="820" height="24" rx="4" fill="none" stroke="none"/>
  <text x="450" y="602" text-anchor="middle" fill="#64748b" font-size="11">Each topic triggers the next consumer in a chained pipeline: Download → Transcribe → Analyze → RAG Index</text>
</svg>