<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect width="900" height="50" rx="0" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">VidLens — Task State Machine</text>

  <!-- ==================== State: Pending ==================== -->
  <rect x="60" y="100" width="160" height="70" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="140" y="130" text-anchor="middle" fill="#374151" font-size="16" font-weight="700">Pending</text>
  <text x="140" y="150" text-anchor="middle" fill="#64748b" font-size="10">Task created, waiting</text>

  <!-- Arrow: Pending → Queued -->
  <line x1="220" y1="135" x2="280" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="232" y="115" width="60" height="18" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="262" y="128" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">Enqueue</text>

  <!-- ==================== State: Queued ==================== -->
  <rect x="285" y="100" width="160" height="70" rx="14" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="2"/>
  <text x="365" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Queued</text>
  <text x="365" y="150" text-anchor="middle" fill="#bfdbfe" font-size="10">In Kafka queue</text>

  <!-- Arrow: Queued → Running -->
  <line x1="445" y1="135" x2="505" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="450" y="115" width="65" height="18" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="482" y="128" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">Consume</text>

  <!-- ==================== State: Running ==================== -->
  <rect x="510" y="100" width="160" height="70" rx="14" fill="url(#amberGrad)" stroke="#d97706" stroke-width="2"/>
  <text x="590" y="130" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Running</text>
  <text x="590" y="150" text-anchor="middle" fill="#fef3c7" font-size="10">Processing active</text>

  <!-- Pulsing indicator -->
  <circle cx="590" cy="108" r="4" fill="#fff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Arrow: Running → Completed (success path) -->
  <line x1="670" y1="118" x2="740" y2="80" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="690" y="88" width="70" height="18" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="725" y="101" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Success</text>

  <!-- Arrow: Running → Failed (error path) -->
  <line x1="670" y1="152" x2="740" y2="215" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="688" y="175" width="55" height="18" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="715" y="188" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">Error</text>

  <!-- ==================== State: Completed (Terminal) ==================== -->
  <rect x="745" y="50" width="140" height="70" rx="14" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="3"/>
  <text x="815" y="80" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Completed</text>
  <text x="815" y="100" text-anchor="middle" fill="#dcfce7" font-size="10">Terminal state</text>
  <!-- Double border for terminal -->
  <rect x="750" y="55" width="130" height="60" rx="11" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.5"/>

  <!-- ==================== State: Failed ==================== -->
  <rect x="745" y="190" width="140" height="70" rx="14" fill="url(#amberGrad)" stroke="#d97706" stroke-width="2"/>
  <text x="815" y="220" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Failed</text>
  <text x="815" y="240" text-anchor="middle" fill="#fef3c7" font-size="10">Retryable error</text>

  <!-- Arrow: Failed → Queued (retry) -->
  <line x1="745" y1="235" x2="460" y2="235" stroke="#f59e0b" stroke-width="2"/>
  <line x1="460" y1="235" x2="365" y2="170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <rect x="560" y="218" width="80" height="22" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="1"/>
  <text x="600" y="234" text-anchor="middle" fill="#b45309" font-size="10" font-weight="600">Retry (max 3)</text>

  <!-- Arrow: Failed → Dead (exhausted) -->
  <line x1="815" y1="260" x2="815" y2="335" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <rect x="775" y="290" width="80" height="22" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="815" y="306" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Max retries</text>

  <!-- ==================== State: Dead (Terminal) ==================== -->
  <rect x="745" y="345" width="140" height="70" rx="14" fill="url(#redGrad)" stroke="#dc2626" stroke-width="3"/>
  <text x="815" y="375" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Dead</text>
  <text x="815" y="395" text-anchor="middle" fill="#fecaca" font-size="10">Terminal state</text>
  <!-- Double border for terminal -->
  <rect x="750" y="350" width="130" height="60" rx="11" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.5"/>

  <!-- ==================== Running → Running (sub-stages) ==================== -->
  <text x="590" y="200" text-anchor="middle" fill="#374151" font-size="12" font-weight="600">Sub-stages within Running:</text>

  <!-- Sub-stage flow -->
  <rect x="100" y="240" width="120" height="40" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="160" y="265" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Download</text>

  <line x1="220" y1="260" x2="260" y2="260" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="265" y="240" width="120" height="40" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="325" y="265" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Transcribe</text>

  <line x1="385" y1="260" x2="425" y2="260" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="430" y="240" width="120" height="40" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="265" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">Analyze</text>

  <line x1="550" y1="260" x2="590" y2="260" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <rect x="595" y="240" width="120" height="40" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="265" text-anchor="middle" fill="#92400e" font-size="11" font-weight="600">RAG Index</text>

  <!-- Dashed connection from Running to sub-stages -->
  <line x1="590" y1="170" x2="160" y2="240" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ==================== Cancellation Path ==================== -->
  <rect x="100" y="330" width="160" height="50" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="180" y="352" text-anchor="middle" fill="#64748b" font-size="12" font-weight="600">Cancel Request</text>
  <text x="180" y="370" text-anchor="middle" fill="#94a3b8" font-size="10">from API / Admin</text>

  <!-- Arrow from Cancel to Running -->
  <line x1="260" y1="355" x2="510" y2="170" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="390" y="250" fill="#64748b" font-size="10" font-style="italic">cancel</text>

  <!-- ==================== Legend ==================== -->
  <rect x="0" y="440" width="900" height="180" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="450" y="465" text-anchor="middle" fill="#374151" font-size="14" font-weight="700">State Transitions</text>

  <!-- Legend items -->
  <rect x="40" y="485" width="20" height="14" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="66" y="497" fill="#374151" font-size="11">Pending: Initial state</text>

  <rect x="230" y="485" width="20" height="14" rx="4" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="256" y="497" fill="#374151" font-size="11">Queued: Waiting for worker</text>

  <rect x="450" y="485" width="20" height="14" rx="4" fill="url(#amberGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="476" y="497" fill="#374151" font-size="11">Running: Active processing</text>

  <rect x="680" y="485" width="20" height="14" rx="4" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="2"/>
  <text x="706" y="497" fill="#374151" font-size="11">Completed: Success (terminal)</text>

  <rect x="40" y="520" width="20" height="14" rx="4" fill="url(#amberGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="66" y="532" fill="#374151" font-size="11">Failed: Retryable (max 3 retries)</text>

  <rect x="320" y="520" width="20" height="14" rx="4" fill="url(#redGrad)" stroke="#dc2626" stroke-width="2"/>
  <text x="346" y="532" fill="#374151" font-size="11">Dead: Exhausted retries (terminal)</text>

  <line x1="570" y1="527" x2="610" y2="527" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="618" y="532" fill="#374151" font-size="11">Retry path</text>

  <line x1="710" y1="527" x2="750" y2="527" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="758" y="532" fill="#374151" font-size="11">Cancel path</text>

  <!-- Transition table header -->
  <text x="450" y="570" text-anchor="middle" fill="#374151" font-size="12" font-weight="700">Key Transition Rules</text>
  <text x="100" y="590" fill="#64748b" font-size="10">Pending --[Enqueue]--> Queued</text>
  <text x="100" y="606" fill="#64748b" font-size="10">Queued --[Consumer picks up]--> Running</text>
  <text x="100" y="622" fill="#64748b" font-size="10">Running --[Success]--> Completed</text>
  <text x="480" y="590" fill="#64748b" font-size="10">Running --[Error]--> Failed</text>
  <text x="480" y="606" fill="#64748b" font-size="10">Failed --[retry_count < 3]--> Queued</text>
  <text x="480" y="622" fill="#64748b" font-size="10">Failed --[retry_count >= 3]--> Dead</text>
</svg>