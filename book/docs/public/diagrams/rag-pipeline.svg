<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Header -->
  <rect width="900" height="50" rx="0" fill="url(#headerGrad)"/>
  <text x="450" y="32" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">VidLens — RAG Retrieval Pipeline</text>

  <!-- ==================== Step 1: Question Input ==================== -->
  <rect x="330" y="70" width="240" height="50" rx="10" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="100" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">User Question</text>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-size="10">(e.g. "这段视频讲了什么?")</text>

  <!-- Arrow -->
  <line x1="450" y1="120" x2="450" y2="148" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Step 2: Embedding ==================== -->
  <rect x="330" y="152" width="240" height="50" rx="10" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="175" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Embedding Model</text>
  <text x="450" y="190" text-anchor="middle" fill="#fff" font-size="10">Text → Vector (768/1536 dim)</text>

  <!-- Arrow to fork -->
  <line x1="450" y1="202" x2="450" y2="240" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fork point -->
  <circle cx="450" cy="248" r="6" fill="#374151"/>

  <!-- ==================== Branch Left: Vector Search ==================== -->
  <line x1="450" y1="248" x2="210" y2="248" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="210" y1="248" x2="210" y2="280" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <text x="310" y="242" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="600">Route A</text>

  <!-- Vector Search Box -->
  <rect x="110" y="284" width="200" height="80" rx="10" fill="url(#purpleGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="210" y="310" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Vector Search</text>
  <text x="210" y="328" text-anchor="middle" fill="#fff" font-size="10">Cosine Similarity</text>
  <text x="210" y="345" text-anchor="middle" fill="#fff" font-size="10">Milvus Top-50</text>

  <!-- Milvus icon -->
  <rect x="140" y="375" width="140" height="36" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="210" y="398" text-anchor="middle" fill="#7c3aed" font-size="11" font-weight="600">Milvus Vector DB</text>

  <line x1="210" y1="364" x2="210" y2="375" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ==================== Branch Right: BM25 Search ==================== -->
  <line x1="450" y1="248" x2="690" y2="248" stroke="#22c55e" stroke-width="2"/>
  <line x1="690" y1="248" x2="690" y2="280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>

  <text x="590" y="242" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">Route B</text>

  <!-- BM25 Search Box -->
  <rect x="590" y="284" width="200" height="80" rx="10" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="690" y="310" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">BM25 Keyword</text>
  <text x="690" y="328" text-anchor="middle" fill="#fff" font-size="10">Inverted Index</text>
  <text x="690" y="345" text-anchor="middle" fill="#fff" font-size="10">Full-Text Top-50</text>

  <!-- PostgreSQL icon -->
  <rect x="620" y="375" width="140" height="36" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="690" y="398" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="600">PostgreSQL (tsvector)</text>

  <line x1="690" y1="364" x2="690" y2="375" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ==================== Merge Point ==================== -->
  <line x1="210" y1="411" x2="210" y2="455" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="690" y1="411" x2="690" y2="455" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="210" y1="455" x2="450" y2="455" stroke="#f59e0b" stroke-width="2"/>
  <line x1="690" y1="455" x2="450" y2="455" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="450" cy="455" r="6" fill="#f59e0b"/>

  <!-- ==================== Step: RRF Fusion ==================== -->
  <line x1="450" y1="461" x2="450" y2="480" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <rect x="300" y="484" width="300" height="60" rx="10" fill="url(#amberGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="507" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">RRF Fusion (Reciprocal Rank Fusion)</text>
  <text x="450" y="528" text-anchor="middle" fill="#fff" font-size="11">score = sum(1 / (k + rank_i)) for each route</text>

  <!-- Arrow -->
  <line x1="450" y1="544" x2="450" y2="568" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Step: Top-K Selection ==================== -->
  <rect x="330" y="572" width="240" height="44" rx="10" fill="url(#amberGrad)" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="600" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">Top-K Selection (K=5~10)</text>

  <!-- Arrow -->
  <line x1="450" y1="616" x2="450" y2="640" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Step: Prompt Construction ==================== -->
  <rect x="280" y="644" width="340" height="44" rx="10" fill="url(#blueGrad)" stroke="#2563eb" stroke-width="1.5"/>
  <text x="450" y="663" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Build Prompt</text>
  <text x="450" y="678" text-anchor="middle" fill="#fff" font-size="10">Context (chunks) + Question + System Prompt</text>

  <!-- Arrow to LLM (right side) -->
  <line x1="620" y1="666" x2="700" y2="666" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Step: LLM ==================== -->
  <rect x="705" y="640" width="160" height="55" rx="10" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="785" y="663" text-anchor="middle" fill="#fff" font-size="14" font-weight="600">LLM Generate</text>
  <text x="785" y="680" text-anchor="middle" fill="#fff" font-size="10">GPT-4 / Local LLM</text>

  <!-- Arrow to SSE -->
  <line x1="785" y1="695" x2="785" y2="716" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ==================== Step: SSE Output ==================== -->
  <rect x="685" y="720" width="200" height="18" rx="9" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="785" y="733" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">SSE Stream → Client</text>

  <!-- ==================== Legend ==================== -->
  <rect x="20" y="700" width="260" height="40" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="716" fill="#374151" font-size="10" font-weight="700">Legend:</text>

  <rect x="30" y="725" width="16" height="10" rx="3" fill="url(#purpleGrad)" stroke="#7c3aed" stroke-width="0.5"/>
  <text x="50" y="734" fill="#374151" font-size="9">Vector Search</text>

  <rect x="130" y="725" width="16" height="10" rx="3" fill="url(#greenGrad)" stroke="#16a34a" stroke-width="0.5"/>
  <text x="150" y="734" fill="#374151" font-size="9">BM25 / LLM</text>

  <rect x="220" y="725" width="16" height="10" rx="3" fill="url(#amberGrad)" stroke="#d97706" stroke-width="0.5"/>
  <text x="240" y="734" fill="#374151" font-size="9">Fusion</text>
</svg>