services:
  # =========================================
  # 1. MySQL (数据库)
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: vidlens-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=vidlens
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - vidlens-net

  # =========================================
  # 2. Redis (缓存 + 分布式锁)
  # =========================================
  redis:
    image: redis:latest
    container_name: vidlens-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    networks:
      - vidlens-net

  # =========================================
  # 3. MinIO (对象存储)
  # =========================================
  minio:
    image: minio/minio
    container_name: vidlens-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - vidlens-net

  # =========================================
  # 4. Zookeeper (Kafka 依赖)
  # =========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: vidlens-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - vidlens-net

  # =========================================
  # 5. Kafka (消息队列)
  # =========================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: vidlens-kafka
    ports:
      - "19092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - vidlens-net

  # =========================================
  # 6. Milvus Etcd (向量数据库依赖)
  # =========================================
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: vidlens-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd --advertise-client-urls=http://milvus-etcd:2379 --listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes:
      - ./data/milvus/etcd:/etcd
    networks:
      - vidlens-net

  # =========================================
  # 7. Milvus Standalone (RAG 向量库)
  # =========================================
  milvus:
    image: milvusdb/milvus:v2.4.15
    container_name: vidlens-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "19530:19530"
    volumes:
      - ./data/milvus/data:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - minio
    networks:
      - vidlens-net

  # =========================================
  # 8. Kafka UI (可视化管理)
  # =========================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vidlens-kafka-ui
    ports:
      - "8180:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vidlens
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka
    networks:
      - vidlens-net

networks:
  vidlens-net:
    driver: bridge
