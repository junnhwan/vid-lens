name: Deploy Server

on:
  push:
    branches: [main]
    paths-ignore:
      - "book/**"
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/deploy-server.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vidlens-server
  cancel-in-progress: false

env:
  DEPLOY_PATH: /opt/vidlens
  RUNTIME_GENERATION: postgres-pgvector-v1
  INTERNAL_READY_URL: http://127.0.0.1:18083/readyz
  PUBLIC_HEALTH_URL: http://vidlens.wanjune.qzz.io/health

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test deployment safety
        run: bash deploy/server-deploy_test.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test backend
        run: go test -count=1 ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Test frontend
        run: npm test
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web

      - name: Build backend
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o build/server ./cmd/server
          tar -czf build/web-dist.tar.gz -C web dist

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.VIDLENS_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.VIDLENS_DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.VIDLENS_DEPLOY_SSH_KEY }}
          DEPLOY_USER: ${{ secrets.VIDLENS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing one of VIDLENS_DEPLOY_HOST, VIDLENS_DEPLOY_USER, VIDLENS_DEPLOY_SSH_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/vidlens_deploy_key
          chmod 600 ~/.ssh/vidlens_deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifacts
        env:
          DEPLOY_HOST: ${{ secrets.VIDLENS_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.VIDLENS_DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.VIDLENS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          remote_tmp="/tmp/vidlens-deploy-${GITHUB_SHA}"
          ssh -i ~/.ssh/vidlens_deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$remote_tmp'"
          scp -i ~/.ssh/vidlens_deploy_key -P "$DEPLOY_PORT" build/server build/web-dist.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$remote_tmp/"

      - name: Deploy and restart service
        env:
          DEPLOY_HOST: ${{ secrets.VIDLENS_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.VIDLENS_DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.VIDLENS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          remote_tmp="/tmp/vidlens-deploy-${GITHUB_SHA}"
          ssh -i ~/.ssh/vidlens_deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' DEPLOY_TMP_DIR='$remote_tmp' GITHUB_SHA='$GITHUB_SHA' EXPECTED_RUNTIME_GENERATION='$RUNTIME_GENERATION' HEALTH_URL='$INTERNAL_READY_URL' bash -s" \
            < deploy/server-deploy.sh

      - name: Verify public health
        run: curl -fsS --retry 5 --retry-delay 2 "$PUBLIC_HEALTH_URL"
